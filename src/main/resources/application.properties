# ============================================================
#  Sugar Corner ? Application Properties
# ============================================================

# ?? Server ??????????????????????????????????????????????????
server.port=${PORT:8080}
server.servlet.session.timeout=30m
server.tomcat.threads.max=200
server.tomcat.connection-timeout=30000


# ?? DataSource ??????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=30000&socketTimeout=30000&autoReconnect=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# ------------------------------------------------------------
# JPA / Hibernate Configuration
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# Thymeleaf Configuration
# ------------------------------------------------------------
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ------------------------------------------------------------
# Multipart (File Upload) Configuration
# ------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2MB

# ------------------------------------------------------------
# Logging Configuration
# ------------------------------------------------------------
logging.level.com.brownieshop=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=INFO
logging.level.com.zaxxer.hikari=DEBUG

# ------------------------------------------------------------
# Static Resources
# ------------------------------------------------------------
spring.web.resources.static-locations=classpath:/static/,classpath:/public/
spring.web.resources.cache.period=3600

# ------------------------------------------------------------
# Application Info
# ------------------------------------------------------------
spring.application.name=Sugar-Corner
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp