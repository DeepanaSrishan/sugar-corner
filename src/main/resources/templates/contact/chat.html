<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Chat – ' + ${inquiry.subject}">Live Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root{--brown-dark:#2C1810;--brown-mid:#5C3317;--brown-warm:#8B4513;--caramel:#C68642;
            --cream:#FDF6EC;--cream-dark:#F5E6D0;--white:#FFFEF9;--text-dark:#1A0F08;
            --text-muted:#7A5C45;--success:#27AE60;--sidebar-w:260px;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);display:flex;min-height:100vh;}
        .sidebar{width:var(--sidebar-w);background:linear-gradient(175deg,var(--brown-dark),var(--brown-mid));
            position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;padding:32px 0;z-index:100;}
        .sidebar-brand{text-align:center;padding:0 24px 32px;border-bottom:1px solid rgba(255,255,255,.1);}
        .sidebar-brand .logo{font-size:38px;display:block;margin-bottom:8px;}
        .sidebar-brand h2{font-family:'Playfair Display',serif;color:var(--cream);font-size:1.3rem;}
        .sidebar-brand small{color:var(--caramel);font-size:.75rem;letter-spacing:1px;text-transform:uppercase;}
        nav{flex:1;padding:8px 16px;}
        .nav-section{font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(253,246,236,.4);padding:14px 12px 5px;}
        .nav-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;margin-bottom:3px;
            color:rgba(253,246,236,.8);font-size:.87rem;text-decoration:none;transition:all .2s;}
        .nav-item:hover,.nav-item.active{background:rgba(196,134,66,.25);color:var(--cream);}
        .nav-icon{font-size:16px;width:20px;text-align:center;}
        .sidebar-footer{padding:0 16px 16px;}
        .logout-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;
            color:rgba(253,246,236,.6);font-size:.85rem;text-decoration:none;border:1px solid rgba(255,255,255,.1);transition:all .2s;}
        .logout-btn:hover{background:rgba(192,57,43,.25);color:#FF8A80;}
        .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}

        /* Chat layout */
        .chat-header{background:var(--white);padding:16px 28px;border-bottom:1px solid var(--cream-dark);
            display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;
            box-shadow:0 2px 10px rgba(44,24,16,.06);}
        .chat-back{color:var(--text-muted);text-decoration:none;font-size:.84rem;}
        .chat-back:hover{color:var(--brown-warm);}
        .chat-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--brown-dark);}
        .chat-status{padding:4px 12px;border-radius:100px;font-size:.72rem;font-weight:600;}
        .s-new      {background:rgba(230,126,34,.12);color:#E67E22;}
        .s-progress {background:rgba(41,128,185,.12);color:#2980B9;}
        .s-resolved {background:rgba(39,174,96,.12);color:var(--success);}

        /* Messages area */
        .messages-area{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:14px;
            min-height:0;max-height:calc(100vh - 200px);}

        .msg-row{display:flex;gap:10px;max-width:75%;animation:msgIn .25s ease both;}
        .msg-row.from-me{align-self:flex-end;flex-direction:row-reverse;}
        .msg-row.from-admin{align-self:flex-start;}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

        .msg-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;
            align-items:center;justify-content:center;font-size:14px;font-weight:600;color:white;}
        .avatar-customer{background:linear-gradient(135deg,var(--caramel),var(--brown-warm));}
        .avatar-admin   {background:linear-gradient(135deg,#2980B9,#1a5276);}

        .msg-bubble{padding:12px 16px;border-radius:18px;font-size:.875rem;line-height:1.5;max-width:100%;word-break:break-word;}
        .from-me    .msg-bubble{background:var(--brown-warm);color:var(--cream);border-bottom-right-radius:4px;}
        .from-admin .msg-bubble{background:var(--white);border:1px solid var(--cream-dark);color:var(--text-dark);border-bottom-left-radius:4px;}
        .msg-time{font-size:.68rem;color:var(--text-muted);margin-top:3px;text-align:right;}
        .from-admin .msg-time{text-align:left;}
        .msg-name{font-size:.72rem;color:var(--text-muted);margin-bottom:3px;}

        /* Input bar */
        .chat-input-bar{background:var(--white);border-top:1px solid var(--cream-dark);padding:16px 24px;
            display:flex;align-items:flex-end;gap:12px;}
        .chat-input{flex:1;padding:11px 16px;border:1.5px solid #E8D8C4;border-radius:22px;
            font-family:inherit;font-size:.9rem;color:var(--text-dark);background:var(--cream);
            outline:none;transition:all .2s;resize:none;max-height:100px;line-height:1.4;}
        .chat-input:focus{border-color:var(--caramel);background:var(--white);box-shadow:0 0 0 3px rgba(196,134,66,.1);}
        .send-btn{width:42px;height:42px;border-radius:50%;background:var(--brown-warm);color:white;
            border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
            font-size:18px;transition:all .2s;flex-shrink:0;}
        .send-btn:hover{background:var(--brown-mid);transform:scale(1.05);}
        .send-btn:disabled{background:#ccc;cursor:not-allowed;}

        .status-indicator{font-size:.75rem;color:var(--text-muted);padding:4px 24px;text-align:center;}

        @media(max-width:900px){.sidebar{display:none;}.main{margin-left:0;}}
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand">
        <span class="logo">🍫</span>
        <h2>Sugar Corner</h2>
        <small>Customer Portal</small>
    </div>
    <nav>
        <div class="nav-section">Main Menu</div>
        <a class="nav-item" href="/customer/dashboard"><span class="nav-icon">🏠</span> Dashboard</a>
        <a class="nav-item" href="/customer/profile"><span class="nav-icon">👤</span> My Profile</a>
        <div class="nav-section">Shop</div>
        <a class="nav-item" href="/products"><span class="nav-icon">🍫</span> Browse Brownies</a>
        <a class="nav-item" href="/cart"><span class="nav-icon">🛒</span> My Cart</a>
        <a class="nav-item" href="/orders"><span class="nav-icon">📦</span> My Orders</a>
        <a class="nav-item" href="/payments"><span class="nav-icon">💳</span> My Payments</a>
        <div class="nav-section">Support</div>
        <a class="nav-item active" href="/contact"><span class="nav-icon">💬</span> Contact & Feedback</a>
    </nav>
    <div class="sidebar-footer">
        <a class="logout-btn" href="/logout"><span>🚪</span> Sign Out</a>
    </div>
</aside>

<div class="main">
    <!-- Chat Header -->
    <div class="chat-header">
        <a href="/contact" class="chat-back">← Back</a>
        <div style="flex:1;">
            <div class="chat-title" th:text="${inquiry.subject}">Inquiry Subject</div>
            <div style="font-size:.75rem;color:var(--text-muted);">
                Opened <span th:text="${inquiry.createdAt != null} ? ${#temporals.format(inquiry.createdAt,'dd MMM yyyy')} : ''"></span>
            </div>
        </div>
        <span class="chat-status"
              th:text="${inquiry.statusLabel}">Status</span>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messagesArea">
        <div th:each="msg : ${messages}"
             class="msg-row"
             th:classappend="${msg.senderType == 'CUSTOMER'} ? 'from-me' : 'from-admin'"
             th:attr="data-id=${msg.id}">
            <div class="msg-avatar"
                 th:classappend="${msg.senderType == 'CUSTOMER'} ? 'avatar-customer' : 'avatar-admin'"
                 th:text="${msg.senderType == 'CUSTOMER'} ? ${customer.firstName != null ? customer.firstName.substring(0,1).toUpperCase() : 'C'} : 'S'">K</div>
            <div>
                <div class="msg-name"
                     th:text="${msg.senderType == 'CUSTOMER'} ? ${customer.firstName} : 'Support Team'">Name</div>
                <div class="msg-bubble" th:text="${msg.message}">Message</div>
                <div class="msg-time"
                     th:text="${msg.sentAt != null} ? ${#temporals.format(msg.sentAt,'hh:mm a')} : ''"></div>
            </div>
        </div>
    </div>

    <div class="status-indicator" id="statusIndicator"></div>

    <!-- Input Bar -->
    <div class="chat-input-bar" th:if="${inquiry.status != 'RESOLVED'}">
    <textarea class="chat-input" id="msgInput" placeholder="Type your message…" rows="1"
              onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="chat-input-bar" th:if="${inquiry.status == 'RESOLVED'}"
         style="justify-content:center;color:var(--text-muted);font-size:.875rem;">
        ✅ This inquiry has been resolved. <a href="/contact" style="color:var(--caramel);margin-left:6px;">Start a new one</a>
    </div>
</div>

<script th:inline="javascript">
    const INQUIRY_ID = /*[[${inquiry.id}]]*/ 0;
    const SEND_URL   = '/contact/chat/' + INQUIRY_ID + '/send';
    const POLL_URL   = '/contact/chat/' + INQUIRY_ID + '/poll';
    const MY_INITIAL = /*[[${customer.firstName != null ? customer.firstName.substring(0,1).toUpperCase() : 'C'}]]*/ 'K';
    const MY_NAME    = /*[[${customer.firstName}]]*/ 'You';

    let lastMessageId = 0;
    // Find the last rendered message ID
    document.querySelectorAll('.msg-row[data-id]').forEach(r => {
        const id = parseInt(r.dataset.id);
        if (id > lastMessageId) lastMessageId = id;
    });

    function scrollBottom() {
        const area = document.getElementById('messagesArea');
        area.scrollTop = area.scrollHeight;
    }
    scrollBottom();

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        const text  = input.value.trim();
        if (!text) return;

        input.value = '';
        document.getElementById('sendBtn').disabled = true;

        const fd = new FormData();
        fd.append('message', text);

        fetch(SEND_URL, { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    appendMessage({ id: data.messageId, message: text,
                        senderType: 'CUSTOMER', senderName: MY_NAME, sentAt: new Date().toISOString() });
                    lastMessageId = data.messageId;
                }
            })
            .finally(() => { document.getElementById('sendBtn').disabled = false; });
    }

    function appendMessage(m) {
        const area = document.getElementById('messagesArea');
        const isMe = m.senderType === 'CUSTOMER';
        const initial = isMe ? MY_INITIAL : 'S';
        const name    = isMe ? MY_NAME   : 'Support Team';
        const time    = m.sentAt ? new Date(m.sentAt).toLocaleTimeString('en-LK',{hour:'2-digit',minute:'2-digit'}) : '';

        const div = document.createElement('div');
        div.className = 'msg-row ' + (isMe ? 'from-me' : 'from-admin');
        div.dataset.id = m.id;
        div.innerHTML = `
      <div class="msg-avatar ${isMe ? 'avatar-customer' : 'avatar-admin'}">${initial}</div>
      <div>
        <div class="msg-name">${name}</div>
        <div class="msg-bubble">${m.message.replace(/</g,'&lt;')}</div>
        <div class="msg-time">${time}</div>
      </div>`;
        area.appendChild(div);
        scrollBottom();
    }

    // Polling — checks for new messages every 3 seconds
    // Only appends ADMIN messages — customer messages already appear immediately via sendMessage()
    function poll() {
        fetch(POLL_URL + '?lastId=' + lastMessageId)
            .then(r => r.json())
            .then(msgs => {
                msgs.forEach(m => {
                    lastMessageId = m.id; // always update lastMessageId
                    if (m.senderType === 'ADMIN') {
                        // Only render admin replies — customer messages already displayed instantly
                        appendMessage(m);
                        document.getElementById('statusIndicator').textContent = '💬 Support Team replied';
                        setTimeout(() => document.getElementById('statusIndicator').textContent = '', 4000);
                    }
                });
            })
            .catch(() => {});
    }
    setInterval(poll, 3000);
</script>
</body>
</html>
